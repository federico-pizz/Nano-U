# Configuration for Nano-U Project (TensorFlow)

# Global Data settings
data:
  input_shape: [60, 80, 3]  # Height, Width, Channels (TF format: NHWC)
  num_classes: 1            # Binary segmentation
  
  # Normalization parameters (used in training and inference preprocessing)
  # Data is normalized to [-1, 1] range: (x / 255.0 - mean) / std
  normalization:
    mean: [0.5, 0.5, 0.5]
    std: [0.5, 0.5, 0.5]

  # Data splitting strategy used in preparation
  split:
    train: 0.7
    validation: 0.2
    test: 0.1

  paths:
    processed: 
      root: "data/botanic_garden"
      train:
        img: "data/botanic_garden/train/img"
        mask: "data/botanic_garden/train/mask"
      val:
        img: "data/botanic_garden/val/img"
        mask: "data/botanic_garden/val/mask"
      test:
        img: "data/botanic_garden/test/img"
        mask: "data/botanic_garden/test/mask"

    models_dir: "models"


# Model Architecture Definitions
models:
  # Teacher Model (BU_Net) - UNet-like architecture
  bu_net:
    filters: [64, 128, 256, 512, 1024] # Encoder filters
    bottleneck: 1024
    decoder_filters: [512, 256, 128, 64]
    
  # Student Model (Nano_U) - Ultra-light model for embedded deployment
  nano_u:
    filters: [4, 8, 16] # Encoder filters (reduced)
    bottleneck: 32
    decoder_filters: [16, 8, 4]


# Training Hyperparameters
training:
  # General settings
  seed: 37
  
  # Teacher (BU_Net) training config
  bu_net:
    epochs: 120
    batch_size: 16
    learning_rate: 1e-3
    weight_decay: 1e-3
    optimizer: "adamw"
    loss: "binary_crossentropy" 
    augment: true

  # Student (Nano_U) training config
  nano_u:
    epochs: 100 
    batch_size: 8
    learning_rate: 5e-4
    weight_decay: 1e-4
    optimizer: "adamw"
    loss: "binary_crossentropy"
    augment: true
    use_nas: true
    layers_to_monitor: ['enc1a_dw', 'bottleneck_a_dw', 'dec2_conv_b_pw']
    
    # Knowledge Distillation settings
    distillation:
      enabled: true
      teacher_weights: "models/bu_net.keras"
      alpha: 0.3        # Weight for student loss (1-alpha for teacher loss); lower => more teacher influence
      temperature: 4.0  # Higher temperature to soften teacher distribution for richer distillation gradients



# Quantization settings (TFLite)
quantization:
  method: "dynamic_range" # or "full_integer"
  representative_dataset_size: 100
  input_type: "int8"
  output_type: "int8"
  supported_ops:
    - "TFLITE_BUILTINS_INT8"
    - "SELECT_TF_OPS"
