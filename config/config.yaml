# Configuration template for Nano-U
# Copy this file, rename it (e.g. my_dataset_config.yaml), and fill in your paths.

# Global Data settings
data:
  input_shape: [60, 80, 3]  # Height, Width, Channels (TF format: NHWC)
  num_classes: 1            # Binary segmentation

  # Normalization: (x / 255.0 - mean) / std  →  [-1, 1] range
  normalization:
    mean: [0.5, 0.5, 0.5]
    std: [0.5, 0.5, 0.5]

  # Data splitting strategy used during preparation
  split:
    train: 0.7
    validation: 0.2
    test: 0.1

  paths:
    processed:
      root: "data/<your_dataset>"
      train:
        img: "data/<your_dataset>/train/img"
        mask: "data/<your_dataset>/train/mask"
      val:
        img: "data/<your_dataset>/val/img"
        mask: "data/<your_dataset>/val/mask"
      test:
        img: "data/<your_dataset>/test/img"
        mask: "data/<your_dataset>/test/mask"

    models_dir: "models"


# Model Architecture Definitions
models:
  # Teacher Model (BU-Net) — UNet-like architecture
  bu_net:
    filters: [64, 128, 256, 512, 1024]
    bottleneck: 1024
    decoder_filters: [512, 256, 128, 64]

  # Student Model (Nano-U) — ultra-light model for embedded deployment
  nano_u:
    filters: [4, 8, 16]
    bottleneck: 16
    decoder_filters: [16, 8, 4]


# Training Hyperparameters
training:
  seed: 37

  # Teacher (BU-Net) training config
  bu_net:
    epochs: 150
    batch_size: 32
    learning_rate: 1e-3
    weight_decay: 1e-3
    optimizer: "adamw"
    loss: "binary_crossentropy"
    augment: true
    early_stopping: true
    patience: 10
    lr_scheduler: "plateau"
    lr_plateau_patience: 10
    lr_plateau_factor: 0.2
    min_lr: 1e-6

  # Student (Nano-U) training config
  nano_u:
    epochs: 100
    batch_size: 16
    learning_rate: 1e-3
    weight_decay: 1e-4
    optimizer: "adamw"
    loss: "binary_crossentropy"
    augment: true
    early_stopping: true
    patience: 20
    use_nas: true
    qat_enabled: true
    lr_scheduler: "plateau"
    lr_plateau_patience: 10
    lr_plateau_factor: 0.2
    min_lr: 1e-6
    layers_to_monitor: ['enc1a_dw', 'bottleneck_a_dw', 'dec2_conv_b_pw']

    # Knowledge Distillation settings
    distillation:
      enabled: true
      teacher_weights: "models/<your_dataset>/bu_net.h5"
      alpha: 0.5       # Weight for student loss (1-alpha for teacher loss)
      temperature: 4.0 # Higher temperature softens teacher distribution


# Quantization settings (TFLite INT8 export)
quantization:
  method: "dynamic_range"  # or "full_integer"
  representative_dataset_size: 100
  input_type: "int8"
  output_type: "int8"
  supported_ops:
    - "TFLITE_BUILTINS_INT8"
    - "SELECT_TF_OPS"
